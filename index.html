<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css" type="text/css" media="all" />
  <title>INSTAGRAM CLONE</title>
  
</head>
<body>
  <header class="header">
    <i class="fas fa-plus"></i>
    <div class="logo">INSTAGRAM</div>
    <i class="far fa-heart"></i>
  </header>
  <section class="stories">
    <!--A tua histora-->
    <div class="story">
      <div class="img your-story">
        <img src="img/IMG_1728.jpg" alt="" />
        <span class="add"><i class="fas fa-plus"></i></span>
      </div>
      <p>A tua historia</p>
    </div>
    <!--user 1-->
    <div class="story">
      <div class="img">
        <img src="img/IMG_1514.jpg" alt="" />
      </div>
      <p>user1</p>
    </div>
    <!--user 2-->
  <div class="story">
  <div class="img">
    <img src="img/IMG_1588.jpg" alt="" />
    </div>
    <p>user2</p>
  </div>

      <!--user 3-->
  <div class="story">
    <div class="img">
      <img src="img/IMG_1638.jpg" alt="" />
    </div>
    <p>user3</p>
  </div>
  </section>
  
    <!--feed-->
    <section class="feed">
  
  <div class="post">
    
    <!-- topo -->
    <div class="post-header">
      <img src="img/IMG_1728.jpg" class="perfil">
      <span class="username">Real_gustavo_f</span>
    </div>
    
    <!-- imagem -->
    <div class="post-img">
      <img src="img/adcba719-b115-47ba-b75e-fd8143adc419.JPG">
    </div>
    
    <!-- ações -->
    <div class="post-actions">
      <i class="far fa-heart likeBtn"></i>
      <i class="far fa-comment"></i>
      <i class="far fa-paper-plane"></i>
    </div>
    
    <!-- descrição -->
    <div class="post-desc">
      <p><strong>Real_gustavo_f</strong> Essa é a minha publicação 🔥</p>
    </div>
    
  </div>
  
</section>
</body>
  <script src="main.js"></script>
</html>
